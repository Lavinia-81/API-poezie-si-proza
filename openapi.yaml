openapi: 3.0.3

info:
  title: Poems and Prose - API - Romanian Classical Literature
  description: >
    A file-based Node.js + Express API that provides structured access to Romanian
    classical literature: poetry, prose, bibliography, and author images.
    This API exposes short, elegant endpoints that map internally to the file system.
    Designed for cultural, educational, and research use.
  version: 1.0.0
  contact:
    name: Maria Lavinia
  license:
    name: Creative Commons BY-NC 4.0
    url: https://creativecommons.org/licenses/by-nc/4.0/

servers:
  - url: https://api-poezie-si-proza.onrender.com
    description: Production (Render)

tags:
  - name: Autori
  - name: Poezii
  - name: Proza
  - name: Cautare
  - name: Bibliografie
  - name: Imagini

paths:

  /autori:
    get:
      tags: [Autori]
      summary: List all authors
      responses:
        '200':
          description: List of authors
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              example: ["Mihai Eminescu", "George Topîrceanu", "Alecu Donici"]
        '500':
          description: Server error

  /autor/{autor}:
    get:
      tags: [Autori]
      summary: Get full metadata for an author
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Author metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Autor'
        '404':
          description: Author not found
        '500':
          description: Server error

  /autor/{autor}/poza:
    get:
      tags: [Imagini]
      summary: Get author image
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Author image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '404':
          description: Image not found
        '500':
          description: Server error

  /autor/{autor}/bibliografie/text:
    get:
      tags: [Bibliografie]
      summary: Get bibliography text
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bibliography text
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Bibliography not found
        '500':
          description: Server error

  /autor/{autor}/poezie/{id}:
    get:
      tags: [Poezii]
      summary: Get poem metadata by ID
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Poem metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoezieMeta'
        '404':
          description: Poem not found
        '500':
          description: Server error

  /autor/{autor}/poezie/{id}/text:
    get:
      tags: [Poezii]
      summary: Get full poem text
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full poem text
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Poem not found
        '500':
          description: Server error

  /autor/{autor}/proza/{id}:
    get:
      tags: [Proza]
      summary: Get prose metadata by ID
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Prose metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProzaMeta'
        '404':
          description: Prose not found
        '500':
          description: Server error

  /autor/{autor}/proza/{id}/text:
    get:
      tags: [Proza]
      summary: Get full prose text
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Full prose text
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Prose not found
        '500':
          description: Server error

  /cauta/{autor}/{titlu}:
    get:
      tags: [Cautare]
      summary: Search poetry and prose by title
      parameters:
        - in: path
          name: autor
          required: true
          schema:
            type: string
        - in: path
          name: titlu
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'
        '404':
          description: No results found
        '500':
          description: Server error

components:
  schemas:

    Autor:
      type: object
      properties:
        autor:
          type: string
        poza:
          type: string
        bibliografie_path:
          type: string
        poezii:
          type: array
          items:
            $ref: '#/components/schemas/PoezieMeta'
        proza:
          type: array
          items:
            $ref: '#/components/schemas/ProzaMeta'

    PoezieMeta:
      type: object
      properties:
        id:
          type: string
        titlu:
          type: string
        tip:
          type: string
        text_path:
          type: string

    ProzaMeta:
      type: object
      properties:
        id:
          type: string
        titlu:
          type: string
        tip:
          type: string
        text_path:
          type: string

    SearchResult:
      type: object
      properties:
        id:
          type: string
        titlu:
          type: string
        tip:
          type: string