<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Poems and Prose - API - Romanian Classical Literature</title>

    <!-- Font elegant -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Redoc script -->
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: 'Merriweather', serif;
        background-color: #faf7f2;
      }

      /* Header premium */
      .top-header {
        background-color: #6a1b1a; /* burgundy */
        color: #fff;
        padding: 20px 40px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .top-header img {
        height: 40px;
      }

      /* Container Redoc */
      #redoc-container {
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div class="top-header">
      <svg width="42" height="42" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"
          style="margin-right: 12px; animation: pulse 3s ease-in-out infinite;">
          
        <!-- Gradient auriu -->
        <defs>
          <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f7e9a0"/>
            <stop offset="50%" stop-color="#d4af37"/>
            <stop offset="100%" stop-color="#b8860b"/>
          </linearGradient>
        </defs>

        <!-- Pană stilizată -->
        <path d="M52 4C38 10 22 26 18 40c-2 8 2 14 10 14 14 0 28-20 30-34 1-6-1-12-6-16z"
              fill="url(#goldGradient)"
              stroke="#d4af37"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="filter: drop-shadow(0px 0px 4px rgba(212,175,55,0.4));" />
      </svg>

    Poems and Prose - API - Romanian Classical Literature
   </div>
    <!-- Animație subtilă -->
    <style>
      @keyframes pulse {
        0%   { transform: scale(1);   opacity: 0.95; }
        50%  { transform: scale(1.06); opacity: 1; }
        100% { transform: scale(1);   opacity: 0.95; }
      }
    </style>

    <!-- Redoc -->
    <div id="redoc-container"></div>

    <script>
      Redoc.init("../openapi.yaml", {
        theme: {
          colors: {
            primary: {
              main: "#6a1b1a"   /* burgundy */
            },
            text: {
              primary: "#2b2b2b",
              secondary: "#5a5a5a"
            },
            http: {
              get: "#4caf50",
              post: "#1976d2",
              put: "#ffa000",
              delete: "#d32f2f"
            }
          },
          typography: {
            fontFamily: "Merriweather, serif",
            fontSize: "16px",
            headings: {
              fontFamily: "Merriweather, serif",
              fontWeight: "700"
            }
          },
          sidebar: {
            backgroundColor: "#f3ede6"
          }
        }
      }, document.getElementById("redoc-container"));
    </script>
  </body>
</html>
